repos:
  # Zsh syntax check — only reliable tool for zsh files
  - repo: local
    hooks:
      - id: zsh-syntax-check
        name: zsh syntax check
        language: system
        entry: zsh -n
        files: \.zsh$

  # Lua formatting — check mode (formats on save in Neovim; CI only checks)
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.0.2
    hooks:
      - id: stylua

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-toml
