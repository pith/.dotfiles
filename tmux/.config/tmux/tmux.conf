unbind r
bind r source-file ~/.config/tmux/tmux.conf
set -g prefix C-a

set -g mouse on
set -g default-terminal "tmux-256color"
set-option -g status-position top
# Force the status bar to be transparent
set -g status-bg default
set -g status-style bg=default

# --- Start windows at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# --- LazyVim-style Split Shortcuts ---

# Split vertically with '|' (Shift + \)
unbind %
bind | split-window -h -c "#{pane_current_path}"

# Split horizontally with '-'
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

## --- Theme Setup (Catppuccin) ---
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

set -g @catppuccin_window_default_background "default"
set -g @catppuccin_window_current_background "default"
set -g @catppuccin_status_background "default"

# FORCE THE WINDOW NAME (Process name)
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Load the theme file (Manual submodule path)
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Status Bar Modules
set -g status-left ""
set -g status-right-length 100
set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_session}"

## --- TPM Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TPM (MUST BE AT THE BOTTOM)
run '~/.tmux/plugins/tpm/tpm'
